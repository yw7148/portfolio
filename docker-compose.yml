services:
  oracle:
    image: gvenzl/oracle-free:slim-faststart
    container_name: portfolio-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: ${LOCAL_ORACLE_PASSWORD:-oracle}
      APP_USER: ${LOCAL_DB_USER:-portfolio}
      APP_USER_PASSWORD: ${LOCAL_DB_PW:-portfolio}
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data:
